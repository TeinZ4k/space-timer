<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Space Timer</title>
<style>
:root{
  --fg:#ffffff; --glow:#ff7b00; --accent:#ff7b00; --bar:#160b02;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
#bg{position:fixed;inset:0;width:100%;height:100%;display:block;}
#flash{position:fixed;inset:0;pointer-events:none;background:#fff;opacity:0;z-index:5;}
#tapzone{position:fixed;left:0;right:0;top:0;bottom:96px;display:flex;
  flex-direction:column;align-items:center;justify-content:center;z-index:3;}
#num{font-size:clamp(90px,42vw,42vh);font-weight:900;line-height:1;color:var(--fg);
  text-shadow:0 0 30px var(--glow),0 0 90px var(--glow);
  will-change:transform,opacity,filter;letter-spacing:-0.02em;}
#status{margin-top:10px;font-size:16px;letter-spacing:.35em;text-transform:uppercase;
  color:var(--fg);opacity:.55;text-shadow:0 0 12px var(--glow);text-align:center;}
#toast{position:fixed;top:max(20px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.55);color:var(--fg);border:1px solid var(--accent);
  padding:8px 18px;border-radius:99px;font-size:14px;letter-spacing:.15em;z-index:8;
  opacity:0;transition:opacity .3s;pointer-events:none;text-shadow:0 0 8px var(--glow);}
#bar{position:fixed;left:0;right:0;bottom:0;z-index:6;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  display:flex;gap:5px;justify-content:center;align-items:center;
  background:linear-gradient(to top, rgba(0,0,0,.85), rgba(0,0,0,.45));
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid color-mix(in srgb, var(--accent) 40%, transparent);}
.btn{flex:1 1 0;min-width:0;max-width:90px;height:52px;padding:0 2px;
  border-radius:14px;border:1.5px solid var(--accent);
  background:rgba(0,0,0,.35);color:var(--fg);font-size:15px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:2px;
  white-space:nowrap;overflow:hidden;
  text-shadow:0 0 8px var(--glow);transition:background .2s, box-shadow .2s;}
#b30,#b35{font-size:18px;}
.btn.on{background:var(--accent);color:#000;text-shadow:none;
  box-shadow:0 0 18px var(--glow);}
.btn:active{transform:scale(.94);}
#panel{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);}
#panel.open{display:flex;}
#panelBox{background:rgba(10,10,16,.95);border:1.5px solid var(--accent);border-radius:24px;
  padding:26px 22px;display:flex;flex-direction:column;align-items:center;gap:18px;
  box-shadow:0 0 40px var(--glow);}
#panelVal{font-size:64px;font-weight:900;color:var(--fg);text-shadow:0 0 20px var(--glow);}
.prow{display:flex;gap:8px;}
.pbtn{width:58px;height:48px;border-radius:12px;border:1.5px solid var(--accent);
  background:transparent;color:var(--fg);font-size:17px;font-weight:700;}
.pbtn.big{width:100%;background:var(--accent);color:#000;font-size:19px;}
#panelBox .hint{color:var(--fg);opacity:.5;font-size:13px;letter-spacing:.1em;}

/* ============ NUMBER EFFECTS (CSS) ============ */
#num.tick{animation:tick .25s ease-out;}
@keyframes tick{40%{transform:scale(1.07);}}
.fx-popIn{animation:popIn .8s cubic-bezier(.2,1.6,.35,1) both;}
@keyframes popIn{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.25);}100%{transform:scale(1);opacity:1;}}
.fx-dropBounce{animation:dropBounce .9s cubic-bezier(.3,1.5,.5,1) both;}
@keyframes dropBounce{0%{transform:translateY(-120vh);}70%{transform:translateY(6%);}100%{transform:translateY(0);}}
.fx-riseUp{animation:riseUp .8s cubic-bezier(.3,1.4,.5,1) both;}
@keyframes riseUp{0%{transform:translateY(90vh) scale(.4);opacity:0;}100%{transform:none;opacity:1;}}
.fx-slideL{animation:slideL .7s cubic-bezier(.25,1.3,.4,1) both;}
@keyframes slideL{0%{transform:translateX(-110vw) rotate(-25deg);}100%{transform:none;}}
.fx-slideR{animation:slideR .7s cubic-bezier(.25,1.3,.4,1) both;}
@keyframes slideR{0%{transform:translateX(110vw) rotate(25deg);}100%{transform:none;}}
.fx-spinIn{animation:spinIn .9s cubic-bezier(.3,1.2,.4,1) both;}
@keyframes spinIn{0%{transform:rotate(-720deg) scale(0);}100%{transform:none;}}
.fx-flipX{animation:flipX .8s ease both;transform-style:preserve-3d;}
@keyframes flipX{0%{transform:rotateX(540deg) scale(.5);opacity:0;}100%{transform:none;opacity:1;}}
.fx-flipY{animation:flipY .8s ease both;transform-style:preserve-3d;}
@keyframes flipY{0%{transform:rotateY(540deg) scale(.5);opacity:0;}100%{transform:none;opacity:1;}}
.fx-rubber{animation:rubber .9s ease both;}
@keyframes rubber{0%{transform:scale(1);}25%{transform:scale(1.4,.6);}45%{transform:scale(.7,1.3);}65%{transform:scale(1.2,.85);}82%{transform:scale(.92,1.06);}100%{transform:scale(1);}}
.fx-jelly{animation:jelly .9s ease both;}
@keyframes jelly{0%,100%{transform:skew(0);}20%{transform:skew(14deg,6deg) scale(1.1);}40%{transform:skew(-12deg,-5deg);}60%{transform:skew(8deg,3deg);}80%{transform:skew(-4deg,-2deg);}}
.fx-heartbeat{animation:heartbeat .9s ease both;}
@keyframes heartbeat{0%,100%{transform:scale(1);}20%{transform:scale(1.28);}38%{transform:scale(1);}56%{transform:scale(1.28);}74%{transform:scale(1);}}
.fx-wobble{animation:wobble .9s ease both;}
@keyframes wobble{0%,100%{transform:rotate(0);}18%{transform:rotate(14deg);}36%{transform:rotate(-12deg);}54%{transform:rotate(9deg);}72%{transform:rotate(-6deg);}88%{transform:rotate(3deg);}}
.fx-swing{animation:swing 1s ease both;transform-origin:top center;}
@keyframes swing{0%{transform:rotate(60deg);opacity:0;}30%{transform:rotate(-30deg);opacity:1;}55%{transform:rotate(16deg);}75%{transform:rotate(-8deg);}100%{transform:rotate(0);}}
.fx-blurIn{animation:blurIn .8s ease both;}
@keyframes blurIn{0%{filter:blur(30px);opacity:0;transform:scale(1.6);}100%{filter:blur(0);opacity:1;transform:scale(1);}}
.fx-glitch{animation:glitch .7s steps(2,end) both;}
@keyframes glitch{0%{transform:translate(0);}15%{transform:translate(-12px,6px) skewX(20deg);text-shadow:8px 0 #f0f,-8px 0 #0ff;}30%{transform:translate(10px,-8px);text-shadow:-10px 0 #f0f,10px 0 #0ff;}45%{transform:translate(-8px,4px) skewX(-15deg);text-shadow:6px 0 #ff0,-6px 0 #0ff;}60%{transform:translate(6px,-3px);text-shadow:-4px 0 #f0f,4px 0 #0ff;}80%{transform:translate(-3px,2px);}100%{transform:none;text-shadow:0 0 30px var(--glow),0 0 90px var(--glow);}}
.fx-neonFlick{animation:neonFlick .9s linear both;}
@keyframes neonFlick{0%,18%,22%,40%,44%,58%{opacity:.1;}10%,20%,42%,56%,100%{opacity:1;}}
.fx-redAlert{animation:redAlert 1s linear both;}
@keyframes redAlert{0%,100%{color:var(--fg);transform:none;}10%,30%,50%,70%{color:#ff2020;text-shadow:0 0 40px #f00,0 0 100px #f00;transform:translateX(-8px);}20%,40%,60%,80%{color:#ff2020;text-shadow:0 0 40px #f00,0 0 100px #f00;transform:translateX(8px);}}
.fx-rainbow{animation:rainbow 1.1s linear both;}
@keyframes rainbow{0%{filter:hue-rotate(0) saturate(3);transform:scale(1.15);}100%{filter:none;transform:scale(1);}}
.fx-zoomSettle{animation:zoomSettle .9s cubic-bezier(.2,1,.3,1) both;}
@keyframes zoomSettle{0%{transform:scale(3.5);opacity:0;filter:blur(4px);}100%{transform:scale(1);opacity:1;filter:none;}}
.fx-squash{animation:squash .8s ease both;}
@keyframes squash{0%{transform:scaleY(0.05) translateY(45%);}55%{transform:scaleY(1.3) translateY(-4%);}100%{transform:none;}}
.fx-tiltJam{animation:tiltJam .8s ease both;}
@keyframes tiltJam{0%{transform:rotate(-90deg) scale(.3);opacity:0;}60%{transform:rotate(15deg) scale(1.1);opacity:1;}100%{transform:none;}}
.fx-rollIn{animation:rollIn .8s cubic-bezier(.3,1.2,.5,1) both;}
@keyframes rollIn{0%{transform:translateX(-80vw) rotate(-540deg);opacity:0;}100%{transform:none;opacity:1;}}
.fx-fadeScale{animation:fadeScale .9s ease both;}
@keyframes fadeScale{0%{opacity:0;transform:scale(.2);filter:brightness(4);}100%{opacity:1;transform:scale(1);filter:none;}}
.fx-shakeHard{animation:shakeHard .7s linear both;}
@keyframes shakeHard{0%,100%{transform:translate(0);}10%{transform:translate(-14px,8px) rotate(-4deg);}20%{transform:translate(12px,-10px) rotate(3deg);}30%{transform:translate(-10px,6px);}40%{transform:translate(10px,8px) rotate(-3deg);}50%{transform:translate(-8px,-6px);}60%{transform:translate(8px,4px) rotate(2deg);}70%{transform:translate(-6px,4px);}80%{transform:translate(4px,-4px);}90%{transform:translate(-2px,2px);}}
.fx-pulseGlow{animation:pulseGlow 1s ease both;}
@keyframes pulseGlow{0%{text-shadow:0 0 0 transparent;transform:scale(.8);opacity:.3;}40%{text-shadow:0 0 60px var(--glow),0 0 140px var(--glow),0 0 200px var(--glow);transform:scale(1.18);opacity:1;}100%{text-shadow:0 0 30px var(--glow),0 0 90px var(--glow);transform:scale(1);}}
.fx-stretchY{animation:stretchY .8s ease both;}
@keyframes stretchY{0%{transform:scaleY(8) scaleX(.1);opacity:0;}60%{transform:scaleY(.8) scaleX(1.15);opacity:1;}100%{transform:none;}}
.fx-bounceX{animation:bounceX .9s ease both;}
@keyframes bounceX{0%{transform:translateX(70vw);}25%{transform:translateX(-30vw);}50%{transform:translateX(14vw);}72%{transform:translateX(-6vw);}88%{transform:translateX(2vw);}100%{transform:none;}}
.fx-ghostIn{animation:ghostIn 1s ease both;}
@keyframes ghostIn{0%{opacity:0;transform:scale(2.2) translateY(-10%);filter:blur(16px) brightness(3);}100%{opacity:1;transform:none;filter:none;}}
.fx-vanishOld{animation:vanishOld .45s ease both;}
@keyframes vanishOld{0%{transform:scale(1);opacity:1;}100%{transform:scale(0) rotate(180deg);opacity:0;}}
#tapzone.paused #num{opacity:.5;}
#tapzone.paused #status{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:.15;}}
</style>
</head>
<body data-theme="0">
<canvas id="bg"></canvas>
<div id="flash"></div>
<div id="tapzone">
  <div id="num">30</div>
  <div id="status">Tippen zum Starten</div>
</div>
<div id="toast"></div>
<div id="bar">
  <button class="btn" id="b30">30</button>
  <button class="btn" id="b35">35</button>
  <button class="btn" id="bCustom">&#9881;</button>
  <button class="btn" id="bAuto">&#128257;+5s</button>
  <button class="btn" id="bSound">&#128266;</button>
  <button class="btn" id="bTheme">&#127912;</button>
  <button class="btn" id="bFull">&#9974;</button>
</div>
<div id="panel">
  <div id="panelBox">
    <div class="hint">EIGENE ZEIT (SEKUNDEN)</div>
    <div id="panelVal">45</div>
    <div class="prow">
      <button class="pbtn" data-d="-10">-10</button>
      <button class="pbtn" data-d="-5">-5</button>
      <button class="pbtn" data-d="-1">-1</button>
      <button class="pbtn" data-d="1">+1</button>
      <button class="pbtn" data-d="5">+5</button>
      <button class="pbtn" data-d="10">+10</button>
    </div>
    <div class="prow" style="width:100%">
      <button class="pbtn" id="pCancel" style="flex:1">Abbruch</button>
      <button class="pbtn big" id="pOk" style="flex:2">Übernehmen</button>
    </div>
  </div>
</div>
<script>
"use strict";
const TAU=Math.PI*2;
const rand=(a,b)=>a+Math.random()*(b-a);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const $=id=>document.getElementById(id);
const num=$("num"),statusEl=$("status"),flashEl=$("flash"),toastEl=$("toast"),tapzone=$("tapzone");

/* ================= THEMES ================= */
const THEMES=[
 {name:"SPACE (Schwarz/Orange)",scene:"space",bg:["#0d0400","#1c0a00"],glow:"#ff7b00",accent:"#ff8c1a",
  blobs:["#ff6a00","#ff2d00","#ffb300","#ff8c1a"],star:"#ffd9a0"},
 {name:"SCI-FI (Lila/Rosa/Weiss)",scene:"scifi",bg:["#0c0116","#1e0233"],glow:"#e14dff",accent:"#ff2fb9",
  blobs:["#b026ff","#ff2fb9","#ffffff","#7a2bff"],star:"#f2c9ff"},
 {name:"BEACH (Blau/Türkis)",scene:"beach",bg:["#02182e","#0b4257"],glow:"#00e5ff",accent:"#00d5ee",
  blobs:["#00e5ff","#0077ff","#4dffd2","#00aaff"],star:"#bdf3ff"}
];
let themeIdx=0, themeMode="auto"; // "auto" | 0 | 1 | 2
const theme=()=>THEMES[themeIdx];
function applyTheme(){
  const t=theme(),r=document.documentElement.style;
  r.setProperty("--glow",t.glow);r.setProperty("--accent",t.accent);
  buildScene();
}

/* ================= CANVAS BG ================= */
const cv=$("bg"),ctx=cv.getContext("2d");
let w=0,h=0,dpr=1;
const BARH=96;
const cx=()=>w/2, cy=()=>(h-BARH)/2;
function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  w=window.innerWidth;h=window.innerHeight;
  cv.width=w*dpr;cv.height=h*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  if(window.__sceneReady)buildScene();
}
window.addEventListener("resize",resize);resize();

let blobs=[],stars=[],planets=[],glyphs=[],hexes=[],clouds=[];
const seaY=()=>h*.62;
function buildBlobs(){
  blobs=[];const s=Math.min(w,h),sc=theme().scene;
  const n=sc==="beach"?4:(sc==="scifi"?5:8);
  for(let i=0;i<n;i++){
    const b={x:rand(0,w),y:rand(0,h),r:rand(s*.10,s*.24),
      dx:rand(-18,18),dy:rand(-14,14),ph:rand(0,TAU),ps:rand(.3,.9),
      col:theme().blobs[i%theme().blobs.length],
      alpha:sc==="scifi"?.16:(sc==="beach"?.3:.34)};
    if(sc==="beach"){b.y=rand(seaY(),h);b.dy=rand(-5,5);b.r=rand(s*.08,s*.16);}
    blobs.push(b);
  }
}
function buildStars(){
  stars=[];
  for(let i=0;i<110;i++)stars.push({x:rand(0,w),y:rand(0,h),s:rand(.5,2.2),ph:rand(0,TAU),sp:rand(.6,2.4)});
}
function buildScene(){
  buildBlobs();buildStars();
  planets=[];glyphs=[];hexes=[];clouds=[];
  const s=Math.min(w,h),sc=theme().scene;
  if(sc==="space"){
    planets.push({x:w*.16,y:h*.18,r:s*.07,ring:true,dx:2.5,col:"#ff8c1a"});
    planets.push({x:w*.86,y:h*.74,r:s*.04,ring:false,dx:-2,col:"#ffb300"});
  }else if(sc==="scifi"){
    const CH="01<>/#ΛΔΞΣΨ+";
    for(let i=0;i<14;i++)glyphs.push({x:rand(0,w),y:rand(0,h),
      v:rand(40,140),ch:CH.charAt(Math.floor(rand(0,CH.length)))});
    for(let i=0;i<3;i++)hexes.push({x:rand(w*.1,w*.9),y:rand(h*.08,h*.45),
      r:rand(28,66),rot:rand(0,TAU),vr:rand(-.6,.6),dx:rand(-9,9)});
  }else{
    for(let i=0;i<4;i++)clouds.push({x:rand(0,w),y:rand(h*.05,h*.3),s:rand(.6,1.3),v:rand(6,16)});
  }
}
buildScene();

/* ---- scene painters ---- */
function drawEmoji(c,ch,x,y,size,rot,alpha){
  c.save();c.translate(x,y);if(rot)c.rotate(rot);
  c.globalAlpha=alpha==null?1:alpha;
  c.font=size+"px serif";c.textAlign="center";c.textBaseline="middle";
  c.fillText(ch,0,0);c.restore();c.globalAlpha=1;
}
function drawBlobs(c,dt){
  c.globalCompositeOperation="lighter";
  const beach=theme().scene==="beach";
  for(const b of blobs){
    b.x+=b.dx*dt;b.y+=b.dy*dt;b.ph+=b.ps*dt;
    if(b.x<-b.r)b.x=w+b.r;if(b.x>w+b.r)b.x=-b.r;
    const yMin=beach?seaY()-b.r*.4:-b.r;
    if(b.y<yMin)b.y=h+b.r;if(b.y>h+b.r)b.y=yMin;
    const r=b.r*(1+.18*Math.sin(b.ph));
    const g=c.createRadialGradient(b.x,b.y,0,b.x,b.y,r);
    g.addColorStop(0,b.col);g.addColorStop(1,"rgba(0,0,0,0)");
    c.globalAlpha=b.alpha;c.fillStyle=g;
    c.beginPath();c.arc(b.x,b.y,r,0,TAU);c.fill();
  }
  c.globalAlpha=1;c.globalCompositeOperation="source-over";
}
function drawPlanets(c,t,dt){
  for(const p of planets){
    p.x+=p.dx*dt;
    if(p.x>w+p.r*3)p.x=-p.r*3;if(p.x<-p.r*3)p.x=w+p.r*3;
    const g=c.createRadialGradient(p.x-p.r*.3,p.y-p.r*.3,p.r*.1,p.x,p.y,p.r);
    g.addColorStop(0,"#fff");g.addColorStop(.3,p.col);g.addColorStop(1,"#150600");
    c.fillStyle=g;c.beginPath();c.arc(p.x,p.y,p.r,0,TAU);c.fill();
    if(p.ring){
      c.strokeStyle=p.col;c.globalAlpha=.7;c.lineWidth=3;
      c.beginPath();c.ellipse(p.x,p.y,p.r*1.7,p.r*.5,-.35,0,TAU);c.stroke();c.globalAlpha=1;
      const ma=t*.6,mx=p.x+Math.cos(ma)*p.r*2.7,my=p.y+Math.sin(ma)*p.r*1.2;
      c.fillStyle="#ffd9a0";c.beginPath();c.arc(mx,my,p.r*.18,0,TAU);c.fill();
    }
  }
}
function drawScifiFX(c,t,dt){
  /* neon perspective grid */
  const hor=h*.7,vp=cx();
  c.strokeStyle=theme().accent;c.lineWidth=1;c.globalAlpha=.22;
  const n=9,off=(t*.5)%1;
  for(let i=0;i<=n;i++){const f=(i+off)/n,y=hor+(h-hor)*f*f;
    c.beginPath();c.moveTo(0,y);c.lineTo(w,y);c.stroke();}
  for(let i=-7;i<=7;i++){c.beginPath();
    c.moveTo(vp+i*8,hor);c.lineTo(vp+i*w*.13,h);c.stroke();}
  c.globalAlpha=.5;c.strokeStyle=theme().glow;c.lineWidth=2;
  c.beginPath();c.moveTo(0,hor);c.lineTo(w,hor);c.stroke();c.globalAlpha=1;
  /* data rain */
  c.font="15px monospace";c.textAlign="center";c.fillStyle=theme().glow;
  for(const g of glyphs){
    g.y+=g.v*dt;if(g.y>h){g.y=-20;g.x=rand(0,w);}
    c.globalAlpha=.4;c.fillText(g.ch,g.x,g.y);
  }
  c.globalAlpha=1;
  /* holo hexagons */
  c.strokeStyle=theme().glow;
  for(const hx of hexes){
    hx.rot+=hx.vr*dt;hx.x+=hx.dx*dt;
    if(hx.x>w+80)hx.x=-80;if(hx.x<-80)hx.x=w+80;
    c.globalAlpha=.14+.08*Math.abs(Math.sin(t*2+hx.r));c.lineWidth=2;
    c.beginPath();
    for(let i=0;i<=6;i++){const a=hx.rot+i/6*TAU;
      const px=hx.x+Math.cos(a)*hx.r,py=hx.y+Math.sin(a)*hx.r;
      if(i===0)c.moveTo(px,py);else c.lineTo(px,py);}
    c.stroke();
  }
  c.globalAlpha=1;
}
function drawBeachSky(c,t,dt){
  const s=Math.min(w,h),sx=w*.72,sy2=h*.18,r=s*.09;
  const g=c.createRadialGradient(sx,sy2,0,sx,sy2,r*3.2);
  g.addColorStop(0,"rgba(255,255,255,.95)");g.addColorStop(.12,theme().glow);
  g.addColorStop(1,"rgba(0,0,0,0)");
  c.globalAlpha=.85;c.fillStyle=g;
  c.beginPath();c.arc(sx,sy2,r*3.2,0,TAU);c.fill();c.globalAlpha=1;
  for(const cl of clouds){
    cl.x+=cl.v*dt;if(cl.x>w+150)cl.x=-150;
    c.fillStyle="rgba(255,255,255,.07)";
    for(let i=-1;i<=1;i++){c.beginPath();
      c.ellipse(cl.x+i*38*cl.s,cl.y+Math.abs(i)*6,46*cl.s,16*cl.s,0,0,TAU);c.fill();}
  }
}
function drawSeaFX(c,t){
  const sy0=seaY(),cols=["#014a86","#0077cc","#00b4d8"];
  for(let li=0;li<3;li++){
    c.beginPath();c.moveTo(0,h);
    for(let x=0;x<=w+12;x+=12){
      const y=sy0+li*16+Math.sin(x*.014+t*(0.9+li*.5)+li*2)*(22-li*6);
      c.lineTo(x,y);
    }
    c.lineTo(w,h);c.closePath();
    c.globalAlpha=.5;c.fillStyle=cols[li];c.fill();
  }
  c.globalAlpha=1;
  /* sun glitter on water */
  const sx=w*.72;c.fillStyle="#fff";
  for(let i=0;i<9;i++){
    const y=sy0+16+i*((h-BARH-sy0-10)/9);
    const a=.08+.22*Math.abs(Math.sin(t*2.4+i*1.9));
    const wd=Math.min(w,h)*.1*(1-i*.05);
    c.globalAlpha=a;c.fillRect(sx-wd/2+Math.sin(t*1.3+i)*8,y,wd,3);
  }
  c.globalAlpha=1;
}
function drawScene(c,now,dt){
  const sc=theme().scene,t=now/1000;
  for(const s of stars){
    if(sc==="beach"&&s.y>seaY())continue;
    const a=(.25+.75*Math.abs(Math.sin(t*s.sp+s.ph)))*(sc==="beach"?.6:1);
    c.globalAlpha=a;c.fillStyle=theme().star;
    c.beginPath();c.arc(s.x,s.y,s.s,0,TAU);c.fill();
  }
  c.globalAlpha=1;
  if(sc==="beach")drawBeachSky(c,t,dt);
  drawBlobs(c,dt);
  if(sc==="space")drawPlanets(c,t,dt);
  if(sc==="scifi")drawScifiFX(c,t,dt);
  if(sc==="beach")drawSeaFX(c,t);
}

/* ================= ACTOR / FX SYSTEM ================= */
let actors=[];
let shakeT=0,shakeP=0;
function shake(p,d){shakeP=p||14;shakeT=d||.5;}
function flash(a,d){
  flashEl.style.transition="none";flashEl.style.opacity=a==null?.7:a;
  requestAnimationFrame(()=>{flashEl.style.transition="opacity "+(d||300)+"ms ease-out";flashEl.style.opacity=0;});
}
function burst(x,y,o){
  o=o||{};const n=o.n||26;
  for(let i=0;i<n;i++){
    const a=rand(0,TAU),s=rand(.25,1)*(o.speed||420);
    actors.push({t:0,life:o.life||rand(.5,1.1),x:x,y:y,
      vx:Math.cos(a)*s,vy:Math.sin(a)*s,g:o.grav==null?300:o.grav,
      size:rand(2,o.size||7),color:o.colors?pick(o.colors):pick(theme().blobs),sq:o.square,
      update(dt){this.t+=dt;this.x+=this.vx*dt;this.y+=this.vy*dt;this.vy+=this.g*dt;if(this.t>this.life)this.dead=true;},
      draw(c){const k=Math.max(0,1-this.t/this.life);c.globalAlpha=k;c.fillStyle=this.color;
        if(this.sq){c.fillRect(this.x-this.size,this.y-this.size,this.size*2,this.size*2);}
        else{c.beginPath();c.arc(this.x,this.y,this.size*k+.5,0,TAU);c.fill();}
        c.globalAlpha=1;}});
  }
}
function ring(x,y,o){
  o=o||{};
  actors.push({t:-(o.delay||0),life:o.life||.8,r:o.r0||10,
    update(dt){this.t+=dt;if(this.t<0)return;this.r+=(o.vr||900)*dt;if(this.t>this.life)this.dead=true;},
    draw(c){if(this.t<0)return;const k=Math.max(0,1-this.t/this.life);
      c.globalAlpha=k;c.lineWidth=(o.w||6)*k+1;c.strokeStyle=o.color||theme().glow;
      c.beginPath();c.arc(x,y,this.r,0,TAU);c.stroke();c.globalAlpha=1;}});
}
function spark(x,y,vx,vy,life,color,size){
  actors.push({t:0,life:life,x:x,y:y,vx:vx,vy:vy,
    update(dt){this.t+=dt;this.x+=this.vx*dt;this.y+=this.vy*dt;if(this.t>this.life)this.dead=true;},
    draw(c){const k=1-this.t/this.life;c.globalAlpha=k;c.fillStyle=color;
      c.beginPath();c.arc(this.x,this.y,(size||3)*k+.4,0,TAU);c.fill();c.globalAlpha=1;}});
}

      spark(this.x,this.y,rand(-30,30),rand(-30,30),.5,pick(["#fff",theme().glow]),3);},
    draw(c){c.fillStyle="#fff";c.shadowColor=theme().glow;c.shadowBlur=20;
      c.beginPath();c.arc(this.x||X+R,this.y||Y,8,0,TAU);c.fill();c.shadowBlur=0;}});
}
function fxStarRain(){
  for(let i=0;i<26;i++){
    actors.push({t:-rand(0,.4),life:.9,x:rand(0,w),y:-20,v:rand(700,1200),
      update(dt){this.t+=dt;if(this.t<0)return;this.y+=this.v*dt;if(this.t>this.life)this.dead=true;},
      draw(c){if(this.t<0)return;c.globalAlpha=1-this.t/this.life;
        c.strokeStyle=pick(["#fff",theme().glow]);c.lineWidth=2;
        c.beginPath();c.moveTo(this.x,this.y);c.lineTo(this.x-8,this.y-46);c.stroke();c.globalAlpha=1;}});
  }
}
function fxVortex(){
  const X=cx(),Y=cy();
  for(let i=0;i<50;i++){
    const a=rand(0,TAU);
    actors.push({t:0,life:rand(.7,1.1),a:a,R:rand(.2,.45)*Math.min(w,h),
      update(dt){this.t+=dt;this.a+=dt*6;this.R*=(1-dt*1.8);if(this.t>this.life)this.dead=true;},
      draw(c){c.globalAlpha=1-this.t/this.life;c.fillStyle=pick(theme().blobs);
        c.beginPath();c.arc(X+Math.cos(this.a)*this.R,Y+Math.sin(this.a)*this.R*.7,3.5,0,TAU);c.fill();c.globalAlpha=1;}});
  }
}
function fxPixelBurst(){
  burst(cx(),cy(),{n:44,speed:520,grav:500,square:true,size:9,
    colors:theme().blobs.concat(["#ffffff"])});
  shake(10,.35);
}
const SCENEFX=[fxMeteor,fxPortal,fxBlackhole,fxUFO,fxHyperspace,fxLasers,fxFireworks,
  fxSupernova,fxLightning,fxWarpRings,fxBeam,fxEclipse,fxComet,fxStarRain,fxVortex,fxPixelBurst];

/* ================= NUMBER EFFECTS ================= */
const NUMFX=["popIn","dropBounce","riseUp","slideL","slideR","spinIn","flipX","flipY",
 "rubber","jelly","heartbeat","wobble","swing","blurIn","glitch","neonFlick","redAlert",
 "rainbow","zoomSettle","squash","tiltJam","rollIn","fadeScale","shakeHard","pulseGlow",
 "stretchY","bounceX","ghostIn"];
let curFxClass=null;
function applyNumFX(name){
  if(curFxClass)num.classList.remove(curFxClass);
  num.classList.remove("tick");void num.offsetWidth;
  curFxClass="fx-"+name;num.classList.add(curFxClass);
}
num.addEventListener("animationend",e=>{
  if(curFxClass&&e.animationName!=="tick"){num.classList.remove(curFxClass);curFxClass=null;}
});
function tickPop(){
  if(curFxClass)return;
  num.classList.remove("tick");void num.offsetWidth;num.classList.add("tick");
}

/* bags: no repeats until all used */
function makeBag(src){return{items:[],src:src};}
function drawBag(bag){
  if(!bag.items.length)bag.items=bag.src.slice().sort(()=>Math.random()-.5);
  return bag.items.pop();
}
const sceneBag=makeBag(SCENEFX),numBag=makeBag(NUMFX);
function doFX(finale){
  applyNumFX(drawBag(numBag));
  drawBag(sceneBag)();
  if(finale){flash(.85,450);shake(16,.6);}
}

/* ================= AUDIO ================= */
let actx=null,soundOn=true;
function ensureAudio(){
  if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(actx&&actx.state==="suspended")actx.resume();
}
function strikeTone(t0,f,g,dur){
  const o=actx.createOscillator(),ga=actx.createGain();
  o.type="sine";o.frequency.value=f;
  ga.gain.setValueAtTime(g,t0);
  ga.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(ga);ga.connect(actx.destination);
  o.start(t0);o.stop(t0+dur);
}
function bell(){
  if(!soundOn||!actx)return;const t=actx.currentTime;
  [[880,.5],[2113,.2],[3520,.08]].forEach(p=>{
    strikeTone(t,p[0],p[1],1.6);strikeTone(t+.35,p[0]*1.003,p[1]*.8,1.8);});
}
function ping(){
  if(!soundOn||!actx)return;const t=actx.currentTime;
  strikeTone(t,660,.22,.35);strikeTone(t,990,.1,.3);
}

/* ================= WAKE LOCK ================= */
let wl=null;
async function wakeLock(){try{wl=await navigator.wakeLock.request("screen");}catch(e){}}
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible"&&state!=="idle")wakeLock();});

/* ================= TIMER ================= */
let state="idle"; // idle | run | pause | done
let dur=30,customVal=45,autoLoop=false;
let endAt=0,pauseEnd=0,lastShown=null,lastPauseShown=null;
function startRound(){
  if(themeMode==="auto"&&state!=="idle"){themeIdx=(themeIdx+1)%3;applyTheme();}
  state="run";endAt=performance.now()+dur*1000+40;lastShown=dur;
  tapzone.classList.remove("paused");
  num.textContent=dur;statusEl.textContent="Tipp = Neustart";
  doFX(false);wakeLock();
}
function finishRound(){
  num.textContent="0";bell();doFX(true);
  if(autoLoop){state="pause";pauseEnd=performance.now()+5250;lastPauseShown=null;
    statusEl.textContent="Pause – Auto-Start";}
  else{state="done";statusEl.textContent="Tippen für neue Runde";}
}
function updateTimer(now){
  if(state==="run"){
    const v=Math.max(0,Math.ceil((endAt-now)/1000));
    if(v!==lastShown){lastShown=v;
      if(v===0)finishRound();
      else{num.textContent=v;
        if(v%10===0){doFX(false);ping();}
        else tickPop();}}
  }else if(state==="pause"){
    const pv=Math.max(0,Math.ceil((pauseEnd-now)/1000));
    if(pv!==lastPauseShown){lastPauseShown=pv;
      tapzone.classList.add("paused");num.textContent=pv;}
    if(pv<=0)startRound();
  }
}

/* ================= RENDER LOOP ================= */
let ambT=rand(3,7),lastT=performance.now();
function render(now){
  let dt=(now-lastT)/1000;lastT=now;
  if(dt>0.1)dt=0.1;
  updateTimer(now);
  /* background */
  ctx.clearRect(0,0,w,h);
  const bg=ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,theme().bg[0]);bg.addColorStop(1,theme().bg[1]);
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
  /* shake */
  ctx.save();
  if(shakeT>0){shakeT-=dt;
    ctx.translate(rand(-1,1)*shakeP*shakeT,rand(-1,1)*shakeP*shakeT);}
  /* themed scene (space / sci-fi / beach) */
  drawScene(ctx,now,dt);
  /* ambient events */
  ambT-=dt;
  if(ambT<=0){ambT=rand(2.2,5.5);spawnAmbient();}
  /* actors */
  for(const a of actors){a.update(dt);}
  for(const a of actors){if(!a.dead)a.draw(ctx);}
  actors=actors.filter(a=>!a.dead);
  ctx.restore();
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

/* ================= UI ================= */
let toastT=null;
function toast(msg){
  toastEl.textContent=msg;toastEl.style.opacity=1;
  clearTimeout(toastT);toastT=setTimeout(()=>toastEl.style.opacity=0,1500);
}
/* fullscreen: hides the browser bar so it feels like a real app */
let fullTried=false;
function goFull(){
  const el=document.documentElement;
  if(document.fullscreenElement||document.webkitFullscreenElement){
    (document.exitFullscreen||document.webkitExitFullscreen).call(document);
  }else{
    const req=el.requestFullscreen||el.webkitRequestFullscreen;
    if(req){try{const p=req.call(el);if(p&&p.catch)p.catch(()=>{});}catch(e){}}
  }
}
$("bFull").addEventListener("click",()=>{goFull();});
tapzone.addEventListener("click",()=>{
  ensureAudio();
  if(!fullTried){fullTried=true;
    if(!document.fullscreenElement&&!document.webkitFullscreenElement)goFull();}
  startRound();
});
$("bar").addEventListener("click",e=>e.stopPropagation());

function refreshBtns(){
  $("b30").classList.toggle("on",dur===30);
  $("b35").classList.toggle("on",dur===35);
  const isC=dur!==30&&dur!==35;
  $("bCustom").classList.toggle("on",isC);
  $("bCustom").textContent=isC?("⚙ "+dur):"⚙";
  $("bAuto").classList.toggle("on",autoLoop);
  $("bSound").textContent=soundOn?"🔊":"🔇";
  $("bSound").classList.toggle("on",soundOn);
}
function setDur(d,label){
  dur=d;refreshBtns();save();
  if(state==="idle"||state==="done"){num.textContent=dur;}
  toast(label||(d+" SEKUNDEN"));
}
$("b30").addEventListener("click",()=>{ensureAudio();setDur(30);});
$("b35").addEventListener("click",()=>{ensureAudio();setDur(35);});
$("bAuto").addEventListener("click",()=>{
  autoLoop=!autoLoop;refreshBtns();save();
  toast(autoLoop?"AUTO-LOOP AN (+5s Pause)":"AUTO-LOOP AUS");
});
$("bSound").addEventListener("click",()=>{
  ensureAudio();soundOn=!soundOn;refreshBtns();save();
  toast(soundOn?"SOUND AN":"SOUND AUS");if(soundOn)ping();
});
$("bTheme").addEventListener("click",()=>{
  if(themeMode==="auto")themeMode=0;
  else if(themeMode===2)themeMode="auto";
  else themeMode=themeMode+1;
  if(themeMode!=="auto")themeIdx=themeMode;
  applyTheme();save();
  toast(themeMode==="auto"?"THEME: AUTO-WECHSEL":THEMES[themeIdx].name);
});

/* custom panel */
const panel=$("panel"),panelVal=$("panelVal");
$("bCustom").addEventListener("click",()=>{
  panelVal.textContent=customVal;panel.classList.add("open");});
panel.querySelectorAll(".pbtn[data-d]").forEach(b=>{
  b.addEventListener("click",()=>{
    customVal=Math.min(600,Math.max(5,customVal+parseInt(b.dataset.d,10)));
    panelVal.textContent=customVal;});
});
$("pCancel").addEventListener("click",()=>panel.classList.remove("open"));
$("pOk").addEventListener("click",()=>{
  panel.classList.remove("open");setDur(customVal);});
panel.addEventListener("click",e=>{
  if(e.target===panel)panel.classList.remove("open");e.stopPropagation();});

/* persistence */
function save(){
  try{localStorage.setItem("spaceTimer",JSON.stringify(
    {dur:dur,customVal:customVal,autoLoop:autoLoop,soundOn:soundOn,themeMode:themeMode}));}catch(e){}
}
(function load(){
  try{const s=JSON.parse(localStorage.getItem("spaceTimer"));
    if(s){dur=s.dur||30;customVal=s.customVal||45;autoLoop=!!s.autoLoop;
      soundOn=s.soundOn!==false;
      themeMode=(s.themeMode===0||s.themeMode===1||s.themeMode===2)?s.themeMode:"auto";
      if(themeMode!=="auto")themeIdx=themeMode;else themeIdx=Math.floor(Math.random()*3);}
  }catch(e){}
})();
window.__sceneReady=true;
applyTheme();refreshBtns();num.textContent=dur;
document.addEventListener("dblclick",e=>e.preventDefault());
document.addEventListener("contextmenu",e=>e.preventDefault());
/* PWA: nur aktiv, wenn online gehostet (GitHub Pages etc.) */
if("serviceWorker" in navigator&&location.protocol.indexOf("http")===0){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});});
}
/* v3: PWA + Space / Sci-Fi / Beach scenes */
</script>
</body>
